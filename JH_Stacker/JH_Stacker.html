            textures.box.front || defaultBoxMat, textures.box.back || defaultBoxMat
        ];

        let totalHeightPerPallet = pH + (pat.layers * pat.orient.dy);
        
        const cIntL = 1200; 
        const cIntW = 1000; 
        const cExtL = cIntL + (2 * fluteB);
        const cExtW = cIntW + (2 * fluteB);

        for(let p = 0; p < numPallets; p++) {
            const currentYOffset = p * totalHeightPerPallet;

            // DIBUJAR TARIMA GRIS CON ESTILO DE MADERA
            let palletMesh;
            if(palletType === 'plastico') {
                palletMesh = createPlasticPallet(pL, pH, pW);
            } else {
                palletMesh = createWoodenPallet(pL, pH, pW, 0x7f8c8d); // Madera estilo Gris 
            }
            palletMesh.position.y += currentYOffset;
            group.add(palletMesh);

            const palletLoadGroup = new THREE.Group();
            
            let minBoxX = Infinity, maxBoxX = -Infinity, minBoxZ = Infinity, maxBoxZ = -Infinity;

            for(let lay=0; lay<pat.layers; lay++) {
                const layY = currentYOffset + pH + (lay * pat.orient.dy);

                if(charolaLayers.includes(lay)) {
                    const charGroup = new THREE.Group();
                    const cMat = defaultBoxMat; 
                    const wH = 100; 
                    
                    const wallMatLargo = [barcelMat, barcelMat, cMat, cMat, barcelMat, barcelMat];
                    const wallMatCorto = [barcelMat, barcelMat, cMat, cMat, barcelMat, barcelMat];

                    const cBase = new THREE.Mesh(new THREE.BoxGeometry(cExtL, fluteB, cExtW), cMat);
                    cBase.position.y = layY - (fluteB/2); charGroup.add(cBase);
                    
                    const w1 = new THREE.Mesh(new THREE.BoxGeometry(cExtL, wH, fluteB), wallMatLargo); w1.position.set(0, layY + wH/2, cExtW/2 - fluteB/2); charGroup.add(w1);
                    const w2 = new THREE.Mesh(new THREE.BoxGeometry(cExtL, wH, fluteB), wallMatLargo); w2.position.set(0, layY + wH/2, -cExtW/2 + fluteB/2); charGroup.add(w2);
                    const w3 = new THREE.Mesh(new THREE.BoxGeometry(fluteB, wH, cIntW), wallMatCorto); w3.position.set(cExtL/2 - fluteB/2, layY + wH/2, 0); charGroup.add(w3);
                    const w4 = new THREE.Mesh(new THREE.BoxGeometry(fluteB, wH, cIntW), wallMatCorto); w4.position.set(-cExtL/2 + fluteB/2, layY + wH/2, 0); charGroup.add(w4);
                    
                    charGroup.position.set(0, 0, 0);
                    group.add(charGroup); 
                }
                
                if(sheetLayers.includes(lay)) {
                    const sThick = sheetType === 'corrugado' ? 4 : 1;
                    const sMat = sheetType === 'corrugado' ? defaultBoxMat : new THREE.MeshLambertMaterial({color: 0xdcdde1});
                    const sheet = new THREE.Mesh(new THREE.BoxGeometry(1200, sThick, 1000), sMat);
                    sheet.position.y = layY - sThick/2; 
                    group.add(sheet); 
                }

                const applyRotationLayer = alternated && (lay % 2 !== 0); 
                
                pat.boxes.forEach(b => {
                    const boxGroup = new THREE.Group();
                    let rotY = 0;
                    if(b.rot) rotY = Math.PI / 2; 

                    let bx = b.x; let bz = b.z;
                    if(applyRotationLayer) {
                        bx = pat.effPL - b.x; bz = pat.effPW - b.z;
                        rotY += Math.PI; 
                    }

                    if (lay === 0) {
                        let hw = b.rot ? pat.orient.dz/2 : pat.orient.dx/2; 
                        let hd = b.rot ? pat.orient.dx/2 : pat.orient.dz/2;
                        minBoxX = Math.min(minBoxX, bx - hw); maxBoxX = Math.max(maxBoxX, bx + hw);
                        minBoxZ = Math.min(minBoxZ, bz - hd); maxBoxZ = Math.max(maxBoxZ, bz + hd);
                    }

                    boxGroup.position.set(bx, layY + (pat.orient.dy / 2), bz);
                    
                    const innerContainer = new THREE.Group();
                    innerContainer.add(new THREE.Mesh(boxGeo, mats));
                    if(typeof addClosureToBox === 'function') addClosureToBox(innerContainer, extL, extW, extH);

                    innerContainer.rotation.x = pat.orient.rx;
                    innerContainer.rotation.z = pat.orient.rz;
                    boxGroup.rotation.y = rotY; boxGroup.add(innerContainer);
                    palletLoadGroup.add(boxGroup);
                });
            }

            const cx = (minBoxX + maxBoxX) / 2;
            const cz = (minBoxZ + maxBoxZ) / 2;
            const actLoadL = maxBoxX - minBoxX;
            const actLoadW = maxBoxZ - minBoxZ;

            palletLoadGroup.children.forEach(child => {
                child.position.x -= cx;
                child.position.z -= cz;
            });
            
            group.add(palletLoadGroup);

            // ESQUINEROS 
            const esqMat = new THREE.MeshLambertMaterial({color: 0x7b8c7b});
            const wing = 50; const thick = 5;

            if(esqH > 0) {
                const halfL = actLoadL / 2;
                const halfW = actLoadW / 2;
                const topLoadY = currentYOffset + pH + (pat.layers * pat.orient.dy);
                const esqCenterY = topLoadY - (esqH / 2);
                
                const posEsqV = [
                    {x: halfL, z: halfW, r: 0}, 
                    {x: -halfL, z: halfW, r: -Math.PI/2}, 
                    {x: -halfL, z: -halfW, r: Math.PI}, 
                    {x: halfL, z: -halfW, r: Math.PI/2} 
                ];
                
                posEsqV.forEach(pos => {
                    const corner = new THREE.Group();
                    const wA = new THREE.Mesh(new THREE.BoxGeometry(thick, esqH, wing), esqMat); 
                    wA.position.set(thick/2, 0, -wing/2 + thick);
                    const wB = new THREE.Mesh(new THREE.BoxGeometry(wing, esqH, thick), esqMat); 
                    wB.position.set(-wing/2 + thick, 0, thick/2);
                    
                    corner.add(wA); corner.add(wB);
                    corner.position.set(pos.x, esqCenterY, pos.z);
                    corner.rotation.y = pos.r;
                    group.add(corner);
                });
            }

            if(useCorona) {
                const topY = currentYOffset + pH + (pat.layers * pat.orient.dy); 
                const halfL = actLoadL / 2;
                const halfW = actLoadW / 2;
                
                const cFront = new THREE.Group();
                const cfA = new THREE.Mesh(new THREE.BoxGeometry(actLoadL + thick*2, coronaH, thick), esqMat); cfA.position.set(0, -coronaH/2, thick/2);
                const cfB = new THREE.Mesh(new THREE.BoxGeometry(actLoadL + thick*2, thick, wing), esqMat); cfB.position.set(0, thick/2, -wing/2 + thick);
                cFront.add(cfA); cFront.add(cfB);
                cFront.position.set(0, topY, halfW);
                group.add(cFront);

                const cBack = new THREE.Group();
                const cbA = new THREE.Mesh(new THREE.BoxGeometry(actLoadL + thick*2, coronaH, thick), esqMat); cbA.position.set(0, -coronaH/2, -thick/2);
                const cbB = new THREE.Mesh(new THREE.BoxGeometry(actLoadL + thick*2, thick, wing), esqMat); cbB.position.set(0, thick/2, wing/2 - thick);
                cBack.add(cbA); cBack.add(cbB);
                cBack.position.set(0, topY, -halfW);
                group.add(cBack);

                const shortW = actLoadW - (wing * 2);
                if(shortW > 0) {
                    const cRight = new THREE.Group();
                    const crA = new THREE.Mesh(new THREE.BoxGeometry(thick, coronaH, shortW), esqMat); crA.position.set(thick/2, -coronaH/2, 0);
                    const crB = new THREE.Mesh(new THREE.BoxGeometry(wing, thick, shortW), esqMat); crB.position.set(-wing/2 + thick, thick/2, 0);
                    cRight.add(crA); cRight.add(crB);
                    cRight.position.set(halfL, topY, 0);
                    group.add(cRight);

                    const cLeft = new THREE.Group();
                    const clA = new THREE.Mesh(new THREE.BoxGeometry(thick, coronaH, shortW), esqMat); clA.position.set(-thick/2, -coronaH/2, 0);
                    const clB = new THREE.Mesh(new THREE.BoxGeometry(wing, thick, shortW), esqMat); clB.position.set(wing/2 - thick, thick/2, 0);
                    cLeft.add(clA); cLeft.add(clB);
                    cLeft.position.set(-halfL, topY, 0);
                    group.add(cLeft);
                }
            }

            // --- PLAYO REALISTA AZUL ---
            if(usePlayo) {
                const loadHeight = pat.layers * pat.orient.dy;
                const grip = 50; 
                const playoH = loadHeight + grip; 
                
                const playoMat = new THREE.MeshStandardMaterial({
                    color: 0x0088ff,
                    map: playoTex,
                    transparent: true,
                    opacity: 0.45,
                    roughness: 0.3,
                    metalness: 0.1,
                    depthWrite: false,
                    side: THREE.FrontSide 
                });
                
                const playoL = Math.max(actLoadL, pL) + 4;
                const playoW = Math.max(actLoadW, pW) + 4;
                const t = 2; 

                const playoGroup = new THREE.Group();
                
                const sideY = currentYOffset + pH - grip + (playoH / 2);

                const wallFB = new THREE.BoxGeometry(playoL, playoH, t);
                const wallFront = new THREE.Mesh(wallFB, playoMat);
                wallFront.position.set(0, sideY, playoW/2);
                playoGroup.add(wallFront);
                
                const wallBack = new THREE.Mesh(wallFB, playoMat);
                wallBack.position.set(0, sideY, -playoW/2);
                playoGroup.add(wallBack);

                const wallLR = new THREE.BoxGeometry(t, playoH, playoW);
                const wallLeft = new THREE.Mesh(wallLR, playoMat);
                wallLeft.position.set(-playoL/2, sideY, 0);
                playoGroup.add(wallLeft);
                
                const wallRight = new THREE.Mesh(wallLR, playoMat);
                wallRight.position.set(playoL/2, sideY, 0);
                playoGroup.add(wallRight);

                const topY = currentYOffset + pH + loadHeight;
                const borderZ = playoW * 0.1; 
                const borderX = playoL * 0.1; 
                
                const topFB = new THREE.BoxGeometry(playoL, t, borderZ);
                const topFront = new THREE.Mesh(topFB, playoMat);
                topFront.position.set(0, topY, playoW/2 - borderZ/2);
                playoGroup.add(topFront);
                
                const topBack = new THREE.Mesh(topFB, playoMat);
                topBack.position.set(0, topY, -playoW/2 + borderZ/2);
                playoGroup.add(topBack);

                const topLR = new THREE.BoxGeometry(borderX, t, playoW * 0.8); 
                const topLeft = new THREE.Mesh(topLR, playoMat);
                topLeft.position.set(-playoL/2 + borderX/2, topY, 0);
                playoGroup.add(topLeft);
                
                const topRight = new THREE.Mesh(topLR, playoMat);
                topRight.position.set(playoL/2 - borderX/2, topY, 0);
                playoGroup.add(topRight);

                group.add(playoGroup);
            }
        }

        const totalOverallHeight = totalHeightPerPallet * numPallets;
        const loadHeight = pat.layers * pat.orient.dy;
        const topYPos = totalOverallHeight;
        
        // --- COTAS ---
        drawCota(new THREE.Vector3(-pL/2, 0, pW/2), new THREE.Vector3(pL/2, 0, pW/2), pL.toFixed(0), "#000000", "z", 150); 
        drawCota(new THREE.Vector3(-pL/2, 0, -pW/2), new THREE.Vector3(-pL/2, 0, pW/2), pW.toFixed(0), "#000000", "x", -150); 
        drawCota(new THREE.Vector3(-pL/2, 0, -pW/2), new THREE.Vector3(-pL/2, totalOverallHeight, -pW/2), totalOverallHeight.toFixed(1), "#000000", "x", -250);

        drawCota(new THREE.Vector3(pL/2, topYPos, -pW/2), new THREE.Vector3(pL/2, topYPos, pW/2), pW.toFixed(0), "#ff0000", "y", 150); 
        drawCota(new THREE.Vector3(pL/2, pH, pW/2), new THREE.Vector3(pL/2, topYPos, pW/2), loadHeight.toFixed(0), "#ff0000", "x", 150);

        const camDist = Math.max(pL, pW, totalOverallHeight);
        saveHomeView(
            new THREE.Vector3(-camDist * 1.1, totalOverallHeight * 1.2, camDist * 1.4), 
            new THREE.Vector3(0, totalOverallHeight * 0.4, 0)

    }

    function createBagMesh(w, h, foldAmount, d) {
        const bagGroup = new THREE.Group();
        const sealSize = 15; 
        const bodyH = h - (sealSize * 2); 
        
        const geo = new THREE.BoxGeometry(w, bodyH, d, 16, 16, 2);
        
        const uvAttr = geo.attributes.uv;
        const sealV_Ratio = sealSize / h; 
        
        for (let i = 0; i < uvAttr.count; i++) {
            let v = uvAttr.getY(i);
            let mappedV = sealV_Ratio + (v * (1 - (2 * sealV_Ratio)));
            uvAttr.setY(i, mappedV);
        }

        const pos = geo.attributes.position;
        for (let i = 0; i < pos.count; i++) {
            let x = pos.getX(i); let y = pos.getY(i); let z = pos.getZ(i);
            if (Math.abs(z) > 0.1) { 
                let nx = x / (w/2); let ny = y / (bodyH/2);
                z = z * (0.1 + 0.9 * Math.cos(nx * Math.PI / 2)) * (0.1 + 0.9 * Math.cos(ny * Math.PI / 2));
            }
            pos.setZ(i, z);
        }
        geo.computeVertexNormals();

        const mats = [defaultBagMat, defaultBagMat, defaultBagMat, defaultBagMat,
            textures.bag.front ? new THREE.MeshLambertMaterial({map: textures.bag.front}) : defaultBagMat,
            textures.bag.back ? new THREE.MeshLambertMaterial({map: textures.bag.back}) : defaultBagMat];
        bagGroup.add(new THREE.Mesh(geo, mats));

        const foldRatio = Math.max(0, Math.min(1, foldAmount / 30));
        const angle = foldRatio * (Math.PI / 2);

        const topSealGeo = new THREE.BoxGeometry(w * 0.95, sealSize, d * 0.05);
        const uvTop = topSealGeo.attributes.uv;
        for(let i=0; i<uvTop.count; i++) {
             uvTop.setY(i, 1 - sealV_Ratio + (uvTop.getY(i) * sealV_Ratio)); 
        }
        topSealGeo.translate(0, sealSize/2, 0); 
        const topSeal = new THREE.Mesh(topSealGeo, mats);
        topSeal.position.set(0, bodyH / 2, 0); 
        topSeal.rotation.x = angle; 
        bagGroup.add(topSeal);

        const botSealGeo = new THREE.BoxGeometry(w * 0.95, sealSize, d * 0.05);
        const uvBot = botSealGeo.attributes.uv;
        for(let i=0; i<uvBot.count; i++) {
             uvBot.setY(i, (uvBot.getY(i) * sealV_Ratio)); 
        }
        botSealGeo.translate(0, -sealSize/2, 0); 
        const botSeal = new THREE.Mesh(botSealGeo, mats);
        botSeal.position.set(0, -bodyH / 2, 0); 
        botSeal.rotation.x = -angle; 
        bagGroup.add(botSeal);

        return bagGroup;
    }

    function buildSingleBag() {
        resetScene();
        const bL = parseFloat(document.getElementById('bagL').value) || 135; 
        const bD = parseFloat(document.getElementById('bagDMax').value) || parseFloat(document.getElementById('bagDMin').value) || 55;
        const originalH = parseFloat(document.getElementById('bagH').value) || 260;
        const fold = parseFloat(document.getElementById('bagFold').value) || 0;
        const effH = originalH - fold;

        const bag = createBagMesh(bL, originalH, fold, bD);
        bag.position.y = effH/2; group.add(bag);

        drawCota(new THREE.Vector3(-bL/2, 0, bD/2), new THREE.Vector3(bL/2, 0, bD/2), bL.toFixed(0), "#000000", "z", 60); 
        drawCota(new THREE.Vector3(bL/2, 0, bD/2), new THREE.Vector3(bL/2, 0, -bD/2), bD.toFixed(0), "#000000", "x", 60); 
        drawCota(new THREE.Vector3(-bL/2, 0, bD/2), new THREE.Vector3(-bL/2, effH, bD/2), effH.toFixed(0), "#000000", "x", -60); 

        document.getElementById('results').innerHTML = `<strong>Vista: Bolsa</strong><br>Ancho Base (L): ${bL} | Fondo: ${bD} | Alto Efectivo: ${effH.toFixed(1)}`;
        saveHomeView(new THREE.Vector3(bL*2, effH*2, bD*4), new THREE.Vector3(0, effH/2, 0));
    }

   function addClosureToBox(containerGroup, extL, extW, extH) {
        const closureType = document.getElementById('closureType') ? document.getElementById('closureType').value : 'tape';
        
        if (closureType === 'tape') {
            const tapeW = parseFloat(document.getElementById('tapeW').value) || 0;
            const tapeDrop = parseFloat(document.getElementById('tapeDrop').value) || 0;
            
            if (tapeW > 0) {
                const tTop = new THREE.Mesh(new THREE.BoxGeometry(extL + 3, 3, tapeW), tapeMat);
                tTop.position.y = (extH / 2) + 1.5; 
                containerGroup.add(tTop);
                
                const tBot = new THREE.Mesh(new THREE.BoxGeometry(extL + 3, 3, tapeW), tapeMat);
                tBot.position.y = -(extH / 2) - 1.5; 
                containerGroup.add(tBot);
                
                if (tapeDrop > 0) {
                    const actualDrop = Math.min(tapeDrop, extH/2);
                    const tSideGeo = new THREE.BoxGeometry(3, actualDrop, tapeW);
                    
                    const tSideFrontTop = new THREE.Mesh(tSideGeo, tapeMat);
                    tSideFrontTop.position.set(-extL/2 - 1.5, (extH/2) - actualDrop/2, 0); 
                    containerGroup.add(tSideFrontTop);
                    
                    const tSideBackTop = new THREE.Mesh(tSideGeo, tapeMat);
                    tSideBackTop.position.set(extL/2 + 1.5, (extH/2) - actualDrop/2, 0); 
                    containerGroup.add(tSideBackTop);
                    
                    const tSideFrontBot = new THREE.Mesh(tSideGeo, tapeMat);
                    tSideFrontBot.position.set(-extL/2 - 1.5, -(extH/2) + actualDrop/2, 0); 
                    containerGroup.add(tSideFrontBot);
                    
                    const tSideBackBot = new THREE.Mesh(tSideGeo, tapeMat);
                    tSideBackBot.position.set(extL/2 + 1.5, -(extH/2) + actualDrop/2, 0); 
                    containerGroup.add(tSideBackBot);
                }
            }
        } else if (closureType === 'seal') {
            const diamX = parseFloat(document.getElementById('sealX').value) || 60;
            const diamY = parseFloat(document.getElementById('sealY').value) || 40;
            
            if (diamX > 0 && diamY > 0) {
                const sealMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.6, depthWrite: false, side: THREE.DoubleSide });
                
                const topSealGeo = new THREE.PlaneGeometry(diamX, diamY / 2);
                const topSeal = new THREE.Mesh(topSealGeo, sealMat);
                topSeal.rotation.x = -Math.PI / 2; 
                topSeal.position.set(0, (extH / 2) + 0.5, (extW / 2) - (diamY / 4));
                containerGroup.add(topSeal);

                const frontSealGeo = new THREE.PlaneGeometry(diamX, diamY / 2);
                const frontSeal = new THREE.Mesh(frontSealGeo, sealMat);
                frontSeal.position.set(0, (extH / 2) - (diamY / 4), (extW / 2) + 0.5);
                containerGroup.add(frontSeal);
            }
        }
    }

        const extW = parseFloat(document.getElementById('boxW').value) || 303;

    function buildBagsInBox() {
        resetScene();
        
        const bL = parseFloat(document.getElementById('bagL').value) || 135; 
        const bD = parseFloat(document.getElementById('bagDMax').value) || parseFloat(document.getElementById('bagDMin').value) || 55; 
        const originalH = parseFloat(document.getElementById('bagH').value) || 260;
        const foldAmount = parseFloat(document.getElementById('bagFold').value) || 0;
        const compL = parseFloat(document.getElementById('bagCompL').value) || 0;
        const compD = parseFloat(document.getElementById('bagCompD').value) || 0;
        
        const effectiveBH = originalH - foldAmount; 
        const effectiveBL = bL * (1 - (compL / 100)); 
        const effectiveBD = bD * (1 - (compD / 100));

        const extL = parseFloat(document.getElementById('boxL').value) || 503;
        const extW = parseFloat(document.getElementById('boxW').value) || 303;
        const extH = parseFloat(document.getElementById('boxH').value) || 254;
        
        const fluteT = parseFloat(document.getElementById('boxFlute').value);
        const intL = extL - (2 * fluteT); const intW = extW - (2 * fluteT); const intH = extH - (4 * fluteT); 

        const nx = Math.floor((intL + 2) / effectiveBL);
        const ny = Math.floor(intH / effectiveBH); 
        const nz = Math.floor((intW + 2) / effectiveBD);
        const total = nx * ny * nz;

        currentBoxView = document.getElementById('boxViewType').value;

        let viewText = currentBoxView === 'diagonal' ? "Vista Diagonal (Corrugado Transparente)" : "Vista Superior (Corrugado Abierto)";
        // --- ♻️ CÁLCULO DE EFICIENCIA VOLUMÉTRICA ---
        const volCajaInterno = intL * intW * intH;
        const volBolsasTotal = total * (effectiveBL * effectiveBD * effectiveBH);
        const eficienciaVol = volCajaInterno > 0 ? ((volBolsasTotal / volCajaInterno) * 100).toFixed(1) : 0;

        document.getElementById('results').innerHTML = `
            <strong>${viewText}</strong><br>
            Arreglo: ${nx} Frente x ${nz} Fondo x ${ny} Niveles<br>
            <strong>Total: ${total} bolsas</strong> | <span style="color:#27ae60;"><b>♻️ Eficiencia: ${eficienciaVol}%</b></span>
        `;        

        const openBoxGroup = new THREE.Group();
        
        if (currentBoxView === 'top') {
            const mat = defaultBoxMat; 
            
            const base = new THREE.Mesh(new THREE.BoxGeometry(extL, fluteT, extW), mat);
            base.position.y = fluteT / 2;
            openBoxGroup.add(base);

            const wallF = new THREE.Mesh(new THREE.BoxGeometry(extL, extH, fluteT), mat);
            wallF.position.set(0, extH/2, extW/2 - fluteT/2);
            openBoxGroup.add(wallF);

            const wallB = new THREE.Mesh(new THREE.BoxGeometry(extL, extH, fluteT), mat);
            wallB.position.set(0, extH/2, -extW/2 + fluteT/2);
            openBoxGroup.add(wallB);

            const wallL = new THREE.Mesh(new THREE.BoxGeometry(fluteT, extH, extW - 2*fluteT), mat);
            wallL.position.set(-extL/2 + fluteT/2, extH/2, 0);
            openBoxGroup.add(wallL);

            const wallR = new THREE.Mesh(new THREE.BoxGeometry(fluteT, extH, extW - 2*fluteT), mat);
            wallR.position.set(extL/2 - fluteT/2, extH/2, 0);
            openBoxGroup.add(wallR);

            function createFlap(width, height, depth, rotAxis, rotAngle) {
                const pivot = new THREE.Group();
                const mesh = new THREE.Mesh(new THREE.BoxGeometry(width, height, depth), mat);
                mesh.position.y = height / 2;
                pivot.add(mesh);
                if(rotAxis === 'x') pivot.rotation.x = rotAngle;
                if(rotAxis === 'z') pivot.rotation.z = rotAngle;
                return pivot;
            }

            const flapAngle = Math.PI * 0.6; 

            const flapFront = createFlap(extL, extW/2, fluteT, 'x', flapAngle);
            flapFront.position.set(0, extH, extW/2 - fluteT/2);
            openBoxGroup.add(flapFront);

            const flapBack = createFlap(extL, extW/2, fluteT, 'x', -flapAngle);
            flapBack.position.set(0, extH, -extW/2 + fluteT/2);
            openBoxGroup.add(flapBack);

            const flapLeft = createFlap(fluteT, extW/2, extW, 'z', flapAngle);
            flapLeft.position.set(-extL/2 + fluteT/2, extH, 0);
            openBoxGroup.add(flapLeft);

            const flapRight = createFlap(fluteT, extW/2, extW, 'z', -flapAngle);
            flapRight.position.set(extL/2 - fluteT/2, extH, 0);
            openBoxGroup.add(flapRight);

        } else {
            const transMat = new THREE.MeshBasicMaterial({ color: 0xcd853f, transparent: true, opacity: 0.3, wireframe: false, depthWrite: false });
            const boxMesh = new THREE.Mesh(new THREE.BoxGeometry(extL, extH, extW), transMat);
            boxMesh.position.set(0, extH/2, 0);
            
            const edges = new THREE.EdgesGeometry(new THREE.BoxGeometry(extL, extH, extW));
            const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial( { color: 0x8b4513 } ) );
            line.position.set(0, extH/2, 0);
            
            openBoxGroup.add(boxMesh);
            openBoxGroup.add(line);
        }

        group.add(openBoxGroup);

        const totalPackL = (nx > 0) ? ((nx - 1) * effectiveBL + bL) : 0;
        const totalPackD = (nz > 0) ? ((nz - 1) * effectiveBD + bD) : 0;
        
        const startX = -(totalPackL / 2) + (bL / 2);
        const startY = (effectiveBH / 2) + fluteT; 
        const startZ = -(totalPackD / 2) + (bD / 2);

        for(let i=0; i<nx; i++) {
            for(let j=0; j<ny; j++) {
                for(let k=0; k<nz; k++) {
                    const bag = createBagMesh(bL, originalH, foldAmount, bD);
                    bag.position.set(startX + (i * effectiveBL), startY + (j * effectiveBH), startZ + (k * effectiveBD));
                    group.add(bag);
                }
            }
        }
        
        const camDist = Math.max(extL, extW) * 1.5;
        if (currentBoxView === 'diagonal') {
            saveHomeView(new THREE.Vector3(extL, extH + camDist*0.8, extW), new THREE.Vector3(0, extH/2, 0));
        } else {
            saveHomeView(new THREE.Vector3(0, extH + camDist, 0.1), new THREE.Vector3(0, extH/2, 0));
        }
    }

// --- TEXTURA PROCEDURAL DE SNACKS ---
const createSnackBumpTexture = () => {
    const canvas = document.createElement('canvas');
    canvas.width = 256; canvas.height = 256;
    const ctx = canvas.getContext('2d');
    
    ctx.fillStyle = '#000000'; 
    ctx.fillRect(0, 0, 256, 256);
    
    for (let i = 0; i < 180; i++) {
        ctx.fillStyle = `rgba(255, 255, 255, ${Math.random() * 0.9})`;
        ctx.beginPath();
        const w = 5 + Math.random() * 25; 
        const h = 5 + Math.random() * 8;  
        const angle = Math.random() * Math.PI;
        const x = Math.random() * 256;
        const y = 100 + Math.random() * 140; 
        ctx.ellipse(x, y, w, h, angle, 0, Math.PI * 2);
        ctx.fill();
    }
    const tex = new THREE.CanvasTexture(canvas);
    tex.wrapS = THREE.RepeatWrapping;
    tex.wrapT = THREE.RepeatWrapping;
    return tex;
};
const snackBumpTex = createSnackBumpTexture();

// --- ✈️ SIMULADOR DE PRESIÓN Y ALTITUD ---
let simAnimFrame; 

function checkPressureRisk() {
    if (simAnimFrame) cancelAnimationFrame(simAnimFrame);

    const extL = parseFloat(document.getElementById('boxL').value);
    const extW = parseFloat(document.getElementById('boxW').value);
    const extH = parseFloat(document.getElementById('boxH').value);
    if (!extW || !extL || !extH) {
        alert("⚠️ Por favor, selecciona un Item Corrugado en el paso 2 o ingresa manualmente las dimensiones de la caja antes de simular.");
        return;
    }

    const altOrig = parseFloat(document.getElementById('altOrigen').value) || 0;
    const altDest = parseFloat(document.getElementById('altDestino').value) || 0;
    const resultDiv = document.getElementById('pressureResult');
    
    const calcPressure = (h) => 1013.25 * Math.pow(1 - 0.0000225577 * h, 5.25588);
    const pOrig = calcPressure(altOrig);
    const pDest = calcPressure(altDest);
    const volRatio = pOrig / pDest;
    const percentChange = (volRatio - 1) * 100;

    const bL = parseFloat(document.getElementById('bagL').value) || 135; 
    const originalH = parseFloat(document.getElementById('bagH').value) || 260;
    const fold = parseFloat(document.getElementById('bagFold').value) || 0;
    const effH = originalH - fold;
    const dMin = parseFloat(document.getElementById('bagDMin').value) || 40; 
    const dMax = parseFloat(document.getElementById('bagDMax').value) || 60; 
    const compL = parseFloat(document.getElementById('bagCompL').value) || 0;

    const fluteT = parseFloat(document.getElementById('boxFlute').value) || 2.70;
    const intW = extW - (2 * fluteT); 
    const intL = extL - (2 * fluteT);
    const intH = extH - (4 * fluteT);

    const nx = parseInt(document.getElementById('simFilasX').value) || 1; 
    const nz = parseInt(document.getElementById('simBolsasZ').value) || 1; 
    const effectiveBL = bL * (1 - (compL / 100));
    const ny = Math.floor(intH / effH) || 1; 

    const boxMaxLimit = intW / nz; 
    const bagPhysicalMax = (bL * 2) / Math.PI * 0.85; 
    const absoluteMaxSafeDest = Math.min(boxMaxLimit, bagPhysicalMax);
    const absoluteMinSafeDest = Math.max(40, bL * 0.25); 

    const suggestedMin = (absoluteMinSafeDest / volRatio).toFixed(1);
    const suggestedMax = (absoluteMaxSafeDest / volRatio).toFixed(1);
    const isImpossible = parseFloat(suggestedMin) >= parseFloat(suggestedMax); 

    const dOrig = (dMin + dMax) / 2; 
    const dDest = dOrig * volRatio; 

    const isBoxExplosion = dDest > boxMaxLimit;
    const isBagExplosion = dDest > bagPhysicalMax;
    const isExplosion = isBoxExplosion || isBagExplosion;
    const isVacuum = dDest < absoluteMinSafeDest;
    
    resetScene();
    
    const offsetRight = extL * 0.7; 
    let posOrigen, posDestino, textOrigen, textDestino;

    if (isVacuum) {
        posDestino = -extL * 0.5 - bL * 1.5;
        posOrigen = -extL * 0.5;
        textDestino = "1. Destino (Vacío)";
        textOrigen = "2. Planta Origen";
    } else if (isExplosion) {
        posOrigen = -extL * 0.5 - bL * 1.5;
        posDestino = -extL * 0.5;
        textOrigen = "1. Planta Origen";
        textDestino = "2. Destino (Explosión)";
    } else {
        posOrigen = -extL * 0.5 - bL * 1.5;
        posDestino = -extL * 0.5;
        textOrigen = "1. Planta Origen";
        textDestino = "2. Bolsa Destino";
    }

    const bagOrig = createBagMesh(bL, originalH, fold, dOrig);
    bagOrig.position.set(posOrigen, effH/2, 0);
    group.add(bagOrig);
    
    drawCota(new THREE.Vector3(posOrigen, 0, dOrig/2), new THREE.Vector3(posOrigen, 0, -dOrig/2), dOrig.toFixed(1) + "mm", "#124e70", "x", -60);
    const labelOrig = makeTextSprite(textOrigen, "#124e70");
    labelOrig.position.set(posOrigen, effH + 60, 0);
    group.add(labelOrig);

    const bagDestSingle = createBagMesh(bL, originalH, fold, dOrig);
    bagDestSingle.position.set(posDestino, effH/2, 0);
    
    bagDestSingle.children.forEach((child, index) => {
        if(child.material) {
            child.material = Array.isArray(child.material) ? child.material.map(m => m.clone()) : child.material.clone();
            if (index === 0 && Array.isArray(child.material)) {
                child.material[4].bumpMap = snackBumpTex; child.material[4].bumpScale = 0; 
                child.material[5].bumpMap = snackBumpTex; child.material[5].bumpScale = 0; 
            }
        }
    });
    group.add(bagDestSingle);
    
    const colorDest = (isExplosion || isVacuum || isImpossible) ? "#dc2626" : "#059669";
    drawCota(new THREE.Vector3(posDestino, 0, dDest/2), new THREE.Vector3(posDestino, 0, -dDest/2), dDest.toFixed(1) + "mm", colorDest, "x", 60);
    const labelDestSingle = makeTextSprite(textDestino, colorDest);
    labelDestSingle.position.set(posDestino, effH + 60, 0);
    group.add(labelDestSingle);

    const boxDestGroup = new THREE.Group();
    boxDestGroup.position.set(offsetRight, 0, 0);
    group.add(boxDestGroup);

    const transMat = new THREE.MeshBasicMaterial({ color: 0xcd853f, transparent: true, opacity: 0.3, depthWrite: false });
    const boxMesh = new THREE.Mesh(new THREE.BoxGeometry(extL, extH, extW), transMat);
    boxMesh.position.set(0, extH/2, 0);
    const boxEdges = new THREE.LineSegments(new THREE.EdgesGeometry(new THREE.BoxGeometry(extL, extH, extW)), new THREE.LineBasicMaterial({ color: 0x8b4513 }));
    boxEdges.position.set(0, extH/2, 0);
    boxDestGroup.add(boxMesh);
    boxDestGroup.add(boxEdges);

    const bagsInBox = [];
    const totalPackL = (nx > 0) ? ((nx - 1) * effectiveBL + bL) : 0;
    const startX = -(totalPackL / 2) + (bL / 2);
    const startY = (effH / 2) + fluteT;

    for(let i=0; i<nx; i++) {
        for(let j=0; j<ny; j++) {
            for(let k=0; k<nz; k++) {
                const b = createBagMesh(bL, originalH, fold, dOrig);
                b.userData = { i: i, j: j, k: k };
                
                b.children.forEach((child, index) => {
                    if(child.material) {
                        child.material = Array.isArray(child.material) ? child.material.map(m => m.clone()) : child.material.clone();
                        if (index === 0 && Array.isArray(child.material)) {
                            child.material[4].bumpMap = snackBumpTex; child.material[4].bumpScale = 0; 
                            child.material[5].bumpMap = snackBumpTex; child.material[5].bumpScale = 0; 
                        }
                    }
                });
                
                boxDestGroup.add(b);
                bagsInBox.push(b);
            }
        }
    }
    
    const labelDestBox = makeTextSprite("3. Lote en Caja", colorDest);
    labelDestBox.position.set(offsetRight, Math.max(effH, extH) + 100, 0);
    group.add(labelDestBox);

    drawCota(new THREE.Vector3(offsetRight - extL/2, 0, extW/2), new THREE.Vector3(offsetRight + extL/2, 0, extW/2), extL.toFixed(0) + "mm", "#000000", "z", 80); 
    drawCota(new THREE.Vector3(offsetRight + extL/2, 0, extW/2), new THREE.Vector3(offsetRight + extL/2, 0, -extW/2), extW.toFixed(0) + "mm", "#000000", "x", 80); 
    drawCota(new THREE.Vector3(offsetRight - extL/2, 0, extW/2), new THREE.Vector3(offsetRight - extL/2, extH, extW/2), extH.toFixed(0) + "mm", "#000000", "x", -80); 
    
    const totalWidthDest = nz * dDest;
    drawCota(new THREE.Vector3(offsetRight, extH + 20, totalWidthDest/2), new THREE.Vector3(offsetRight, extH + 20, -totalWidthDest/2), `Ocupación Z: ${totalWidthDest.toFixed(1)}mm`, colorDest, "x", 0);

    const particlesSingle = new THREE.Group();
    const particlesBox = new THREE.Group();
    const particleGeo = new THREE.CylinderGeometry(2, 2, 18, 8); 
    const particleMat = new THREE.MeshLambertMaterial({ color: 0xdc2626, roughness: 0.9 }); 
    
    for(let i = 0; i < 40; i++) {
        const p = new THREE.Mesh(particleGeo, particleMat);
        p.userData = { vx: (Math.random()-0.5)*180, vy: (i%2===0 ? 1 : -1)*(Math.random()*150+80), vz: (Math.random()-0.5)*180, rx: Math.random(), ry: Math.random(), rz: Math.random(), isTop: i%2===0 };
        p.visible = false; particlesSingle.add(p);
    }
    particlesSingle.position.set(posDestino, effH/2, 0);
    group.add(particlesSingle);

    for(let i = 0; i < 80; i++) {
        const p = new THREE.Mesh(particleGeo, particleMat);
        p.userData = { vx: (Math.random()-0.5)*300, vy: (i%2===0 ? 1 : -1)*(Math.random()*200+100), vz: (Math.random()-0.5)*300, rx: Math.random(), ry: Math.random(), rz: Math.random(), isTop: i%2===0 };
        p.visible = false; particlesBox.add(p);
    }
    particlesBox.position.set(offsetRight, extH/2, 0); group.add(particlesBox);

    if (isExplosion || isVacuum || isImpossible) {
        const alertCanvas = document.createElement('canvas'); 
        alertCanvas.width = 800; alertCanvas.height = 200;
        const alertCtx = alertCanvas.getContext('2d'); 
        alertCtx.font = "bold 60px Arial"; 
        alertCtx.textAlign = "center"; alertCtx.textBaseline = "middle";
        alertCtx.fillStyle = "#dc2626"; 
        let riskText = isImpossible ? "RUTA IMPOSIBLE DE EMBALAR" : (isBoxExplosion ? "ABOMBAMIENTO DE CAJA" : (isVacuum ? "VACÍO CRÍTICO" : "RUPTURA DE SELLOS"));
        alertCtx.fillText(`⚠️ ${riskText} ⚠️`, 400, 100);
        const alertSprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(alertCanvas), depthTest: false }));
        alertSprite.userData = { isCota: true, baseSX: 4.5, baseSY: 1.0 }; 
        alertSprite.renderOrder = 10;
        alertSprite.position.set(0, Math.max(effH, extH) + 180, 0); 
        group.add(alertSprite);
    }

    const viewWidth = Math.abs(offsetRight - Math.min(posOrigen, posDestino)) + extL;
    saveHomeView(new THREE.Vector3(0, Math.max(effH, extH) * 2.8, viewWidth * 0.8), new THREE.Vector3(0, extH/2, 0));
    
    let statusHtml = `<h4 style="margin: 0 0 10px 0; color: ${colorDest}; text-align: center; text-transform: uppercase;">⚠️ Simulación de Riesgo ⚠️</h4>`;
    
    if (isImpossible) {
        statusHtml += `<span style="color: #dc2626;">❌ <b>FÍSICAMENTE IMPOSIBLE:</b> La caída de presión exige un colchón que rompería la caja actual.<br><b>⚙️ Acción Requerida:</b> Reduce el arreglo (Ej: de ${nz} a ${nz-1} bolsas) o cambia el item corrugado.</span>`;
        resultDiv.style.borderLeft = "4px solid #dc2626"; resultDiv.style.background = "#fef2f2";
    }
    else if (isExplosion) {
        let reason = isBoxExplosion ? `Romperá el espacio interno de la caja (${intW.toFixed(1)} mm).` : `Supera elongación del film (${bagPhysicalMax.toFixed(1)} mm).`;
        statusHtml += `<span style="color: #dc2626;">💥 <b>Explosión/Abombamiento:</b> Crecerá un <b>${percentChange.toFixed(1)}%</b>. ${reason}<br><b>⚙️ Objetivo Nominal Sugerido en Planta: ${suggestedMax} mm</b>.</span>`;
        resultDiv.style.borderLeft = "4px solid #dc2626"; resultDiv.style.background = "#fef2f2";
    } 
    else if (isVacuum) {
        statusHtml += `<span style="color: #dc2626;">🧊 <b>Producto Trozado:</b> Se chupa un <b>${Math.abs(percentChange).toFixed(1)}%</b> rompiendo el colchón seguro de ${absoluteMinSafeDest.toFixed(1)} mm.<br><b>⚙️ Objetivo Nominal Sugerido en Planta: ${suggestedMin} mm</b>.</span>`;
        resultDiv.style.borderLeft = "4px solid #dc2626"; resultDiv.style.background = "#fef2f2"; 
    } 
    else {
        statusHtml = `<h4 style="margin: 0 0 10px 0; color: #059669; text-align: center; text-transform: uppercase;">✅ Tránsito Seguro ✅</h4><span style="color: #059669;">Volumen cambia <b>${percentChange > 0 ? '+' : ''}${percentChange.toFixed(1)}%</b>. Soporta perfectamente el viaje sin romper la caja ni trozar el producto.</span>`;
        resultDiv.style.borderLeft = "4px solid #059669"; resultDiv.style.background = "#ecfdf5";
    }
    resultDiv.innerHTML = statusHtml; resultDiv.style.display = "block";

    let progress = 0;
    const targetScaleZ = dDest / dOrig;

    const origSealsSingle = { topR: bagDestSingle.children[1].rotation.x, topY: bagDestSingle.children[1].position.y, botR: bagDestSingle.children[2].rotation.x, botY: bagDestSingle.children[2].position.y };
    
    function resetMaterials(bag) {
        bag.children.forEach((c, index) => { 
            if (c.material) {
                let mats = Array.isArray(c.material) ? c.material : [c.material];
                mats.forEach(m => { m.color.setHex(0xD3D3D3); m.roughness = 0.4; m.metalness = 0.7; if (index === 0) m.bumpScale = 0; });
            }
        });
    }

    function applyTensionMaterial(bag, tensionProgress) {
        const currentColor = new THREE.Color(0xD3D3D3).lerp(new THREE.Color(0xff4444), tensionProgress);
        bag.children.forEach(c => { 
            if (c.material) {
                let mats = Array.isArray(c.material) ? c.material : [c.material];
                mats.forEach(m => m.color.copy(currentColor));
            }
        });
    }

    function applyVacuumMaterial(bag, ease) {
        const currentColor = new THREE.Color(0xD3D3D3).lerp(new THREE.Color(0x8b0000), ease);
        bag.children.forEach((c, index) => { 
            if (c.material) {
                let mats = Array.isArray(c.material) ? c.material : [c.material];
                mats.forEach((m, mIdx) => {
                    m.color.copy(currentColor);
                    if (index === 0 && (mIdx === 4 || mIdx === 5)) {
                        m.bumpScale = ease * 35; m.roughness = 0.4 + (0.4 * ease); m.metalness = 0.7 - (0.3 * ease);
                    }
                });
            }
        });
    }

    function popBag(bag, popProgress, seals) {
        bag.children[0].scale.z = Math.max(0.1, 1 - popProgress); 
        if (!isBoxExplosion) {
            bag.children[1].position.y = seals.topY + (popProgress * 60); bag.children[1].rotation.x = seals.topR + (popProgress * Math.PI * 1.5); 
            bag.children[2].position.y = seals.botY - (popProgress * 60); bag.children[2].rotation.x = seals.botR - (popProgress * Math.PI * 1.5);
        }
    }

    function animateSimulation() {
        progress += 0.0056; 
        
        if (progress > 1) {
            progress = 0;
            bagDestSingle.scale.set(1,1,1); bagDestSingle.children[0].scale.set(1,1,1);
            bagDestSingle.children[1].position.set(0, origSealsSingle.topY, 0); bagDestSingle.children[1].rotation.set(origSealsSingle.topR, 0, 0);
            bagDestSingle.children[2].position.set(0, origSealsSingle.botY, 0); bagDestSingle.children[2].rotation.set(origSealsSingle.botR, 0, 0);
            resetMaterials(bagDestSingle);
            
            boxMesh.visible = true; boxEdges.visible = true;
            boxMesh.scale.z = 1; boxEdges.scale.z = 1; 
            bagsInBox.forEach(b => {
                b.scale.set(1,1,1); b.children[0].scale.set(1,1,1);
                b.children[1].position.set(0, origSealsSingle.topY, 0); b.children[1].rotation.set(origSealsSingle.topR, 0, 0);
                b.children[2].position.set(0, origSealsSingle.botY, 0); b.children[2].rotation.set(origSealsSingle.botR, 0, 0);
                resetMaterials(b);
            });

            particlesSingle.children.forEach(p => { p.visible = false; p.position.set(0,0,0); });
            particlesBox.children.forEach(p => { p.visible = false; p.position.set(0,0,0); });
        }

        const ease = progress < 0.5 ? 2 * progress * progress : -1 + (4 - 2 * progress) * progress;
        const currentScaleZ = 1 + (targetScaleZ - 1) * (progress < 0.85 || isVacuum ? ease : 1);

        bagDestSingle.scale.z = currentScaleZ;
        
        const currentTotalWidth = nz * (dOrig * currentScaleZ);
        const currentStartZ = -(currentTotalWidth / 2) + ((dOrig * currentScaleZ) / 2);
        bagsInBox.forEach(b => {
            b.scale.z = currentScaleZ;
            b.position.x = startX + (b.userData.i * effectiveBL);
            b.position.y = startY + (b.userData.j * effH);
            b.position.z = currentStartZ + (b.userData.k * (dOrig * currentScaleZ));
        });

        if (isBoxExplosion && progress < 0.85) {
            const overWidth = currentTotalWidth - intW;
            if (overWidth > 0) {
                const scaleW = 1 + (overWidth / extW);
                boxMesh.scale.z = scaleW; boxEdges.scale.z = scaleW;
            }
        }

        if (isExplosion) {
            if (progress < 0.85) {
                const tensionProgress = progress / 0.85;
                applyTensionMaterial(bagDestSingle, tensionProgress);
                bagsInBox.forEach(b => applyTensionMaterial(b, tensionProgress));
            } else {
                const popProgress = (progress - 0.85) / 0.15; 
                popBag(bagDestSingle, popProgress, origSealsSingle);
                bagsInBox.forEach(b => popBag(b, popProgress, origSealsSingle));

                if (isBoxExplosion) {
                    boxMesh.visible = false; boxEdges.visible = false; 
                }

                particlesSingle.children.forEach(p => {
                    p.visible = true; p.position.x = p.userData.vx * popProgress;
                    p.position.y = (p.userData.isTop ? effH * 0.4 : -effH * 0.4) + (p.userData.vy * popProgress) - (250 * popProgress * popProgress); 
                    p.position.z = p.userData.vz * popProgress;
                    p.rotation.x += p.userData.rx; p.rotation.y += p.userData.ry; p.rotation.z += p.userData.rz;
                });
                
                particlesBox.children.forEach(p => {
                    p.visible = true; p.position.x = p.userData.vx * popProgress;
                    p.position.y = (p.userData.isTop ? extH/2 : -extH/2) + (p.userData.vy * popProgress) - (250 * popProgress * popProgress); 
                    p.position.z = p.userData.vz * popProgress;
                    p.rotation.x += p.userData.rx; p.rotation.y += p.userData.ry; p.rotation.z += p.userData.rz;
                });
            }
        } 
        else if (isVacuum) {
            if (progress > 0.3) {
                applyVacuumMaterial(bagDestSingle, ease);
                bagsInBox.forEach(b => applyVacuumMaterial(b, ease));
            }
        }

        simAnimFrame = requestAnimationFrame(animateSimulation);
    }
    animateSimulation(); 
}

window.transportFactor = 1; // Multiplicador de estrés dinámico

async function calculateRoute() {
    // Tomamos los valores de los inputs de la sección de presión atmosférica
    const orig = document.getElementById('altOrigenCity').value;
    const dest = document.getElementById('altDestinoCity').value;
    const resultDiv = document.getElementById('routeResult');
    
    if(!orig || !dest) return alert("Por favor ingresa Origen y Destino.");
    
    resultDiv.style.display = 'block';
    resultDiv.innerHTML = "⏳ <i>Triangulando coordenadas vía satélite...</i>";

    try {
        // Consultar API de OpenStreetMap (Gratuita)
        let resO = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(orig)}`);
        let dataO = await resO.json();
        // Pausa de 1 segundo para no saturar la API gratuita
        await new Promise(r => setTimeout(r, 1000));
        let resD = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(dest)}`);
        let dataD = await resD.json();

        if(dataO.length === 0 || dataD.length === 0) throw new Error("No se encontró la ciudad");

        let lat1 = parseFloat(dataO[0].lat), lon1 = parseFloat(dataO[0].lon);
        let lat2 = parseFloat(dataD[0].lat), lon2 = parseFloat(dataD[0].lon);

        // Fórmula de Haversine para distancia en la esfera terrestre
        const R = 6371; // Radio de la Tierra en km
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2)*Math.sin(dLat/2) + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        const distRecta = R * c;
        const distKm = distRecta * 1.3; // Multiplicador promedio para caminos reales

        // 🧠 Heurística Logística: Sugerencia de Transporte
        // Si cruza el océano (más de 3500km o Europa/Asia), es marítimo.
        let isMaritimo = distKm > 3500; 
        
        let mode = isMaritimo ? "🚢 Marítimo (Contenedor)" : "🚛 Terrestre (Tráiler/Tren)";
        let risks = isMaritimo ? "Alta Humedad, Condensación, Balanceo (Roll/Pitch)" : "Baches, Frenado brusco, Vibración de Suspensión";
        
        // Castigos Estructurales (Física de Empaque)
        window.transportFactor = isMaritimo ? 4 : 3; // El movimiento multiplica el peso que siente la caja base
        window.humidityDecay = isMaritimo ? 0.5 : 0.8; // El mar pudre el cartón (pierde 50% de BCT)

        resultDiv.innerHTML = `
            <div style="display:flex; justify-content:space-between; margin-bottom:6px; border-bottom: 1px solid #1abc9c; padding-bottom: 4px;">
                <b>📍 Distancia Terrestre Est.:</b> <span>~${distKm.toFixed(0)} km</span>
            </div>
            <b>Logística Sugerida:</b> <span style="color:#2980b9; font-weight:bold;">${mode}</span><br>
            <b>Riesgos Dinámicos:</b> ${risks}<br>
            <div style="margin-top:6px; font-size:11px; color:#e74c3c;">
                <i>*Impacto aplicado: Fuerza x${window.transportFactor} | Retención Cartón: ${window.humidityDecay * 100}%</i>
            </div>
        `;
        
// Actualizar valores de BCT/ECT con la nueva ruta silenciosamente
        if (generatedPatterns.length > 0) {
            renderSelectedPattern(0); // Recalcula la resistencia aplicando humedad e impacto
            
            // Abrir el menú de resistencias automáticamente para mostrar los resultados
            const btnRes = document.getElementById('btnAccordionResistencias');
            const contentRes = document.getElementById('contentResistencias');
            if (btnRes && !btnRes.classList.contains('active')) {
                btnRes.classList.add('active');
                contentRes.classList.add('show');
            }
        }       

    } catch (e) {
        resultDiv.innerHTML = "❌ <b>Error:</b> No pude encontrar una de las ciudades en el mapa. Intenta agregar el país (Ej: 'Monterrey, MX').";
    }
}

let isTilted = false, tiltDirection = 1;
let isVibrating = false;
let isFailingTilt = false; 
let isFailingVibe = false; 
let criticalTiltAngle = 0; 
let stabilityMsgSprite = null;

// --- 0. SUELO DE LABORATORIO (Se crea bajo demanda) ---
let simFloor, gridHelper;
function toggleFloor(show) {
    if (!simFloor) {
        // Piso sólido
        simFloor = new THREE.Mesh(new THREE.PlaneGeometry(10000, 10000), new THREE.MeshLambertMaterial({ color: 0xe2e8f0 }));
        simFloor.rotation.x = -Math.PI / 2;
        simFloor.position.y = -1; // Ligeramente abajo para evitar recortes
        scene.add(simFloor);
        
        // Cuadrícula de laboratorio
        gridHelper = new THREE.GridHelper(10000, 100, 0x94a3b8, 0xcbd5e1);
        gridHelper.position.y = 0;
        scene.add(gridHelper);
    }
    simFloor.visible = show;
    gridHelper.visible = show;
}

function animate() {
    requestAnimationFrame(animate);
    controls.update();

    // --- 1. LÓGICA DE INCLINACIÓN (TILT) ---
    if (typeof isTilted !== 'undefined' && isTilted) {
        if (isFailingTilt) {
            group.rotation.z = THREE.MathUtils.lerp(group.rotation.z, (Math.PI / 2) * tiltDirection, 0.04);
        } else {
            const angleOSc = (Math.sin(Date.now() * 0.001) * 2) * (Math.PI / 180);
            group.rotation.z = (15 * (Math.PI / 180) * tiltDirection) + angleOSc;
        }
        if (typeof stabilityMsgSprite !== 'undefined' && stabilityMsgSprite) {
            stabilityMsgSprite.position.y = (group.userData.totalH || 1000) + 300;
        }
    } else if (typeof isTilted !== 'undefined' && group) {
        group.rotation.z = THREE.MathUtils.lerp(group.rotation.z, 0, 0.1);
    }

    // --- 2. LÓGICA DE VIBRACIÓN (VIBE) ---
    if (typeof isVibrating !== 'undefined' && isVibrating) {
        const time = Date.now() * 0.05;
        const intensity = 3;
        group.position.x = Math.sin(time) * intensity;

        group.traverse(child => {
            if (child.userData.isBox) {
                const totalH = group.userData.totalH || 1500;
                const heightFactor = Math.pow(child.userData.origY / totalH, 1.5);

                if (isFailingVibe) {
                    if (child.userData.origY > totalH * 0.4) {
                        child.position.x += child.userData.vx;
                        child.userData.vy -= 1.5; // Gravedad
                        child.position.y += child.userData.vy;
                        child.position.z += child.userData.vz;

                        if (child.position.y < 120) {
                            child.position.y = 120;
                            child.userData.vy *= -0.3; // Rebote
                            child.userData.vx *= 0.85; // Fricción
                            child.userData.vz *= 0.85;
                        }

                        child.rotation.x += child.userData.vx * 0.01;
                        child.rotation.z += child.userData.vz * 0.01;
                    } else {
                        child.position.x = child.userData.origX + Math.sin(time * 0.8 + child.userData.origY) * (intensity * 2) * heightFactor;
                    }
                } else {
                    const wobble = Math.sin(time * 0.8) * (intensity * 4) * heightFactor;
                    child.position.x = child.userData.origX + wobble;
                }
            }
        });
    } else if (typeof isVibrating !== 'undefined' && group) {
        group.position.x = THREE.MathUtils.lerp(group.position.x, 0, 0.1);
        group.traverse(child => {
            if (child.userData.isBox) {
                child.position.x = THREE.MathUtils.lerp(child.position.x, child.userData.origX, 0.1);
                child.position.y = THREE.MathUtils.lerp(child.position.y, child.userData.origY, 0.1);
                child.position.z = THREE.MathUtils.lerp(child.position.z, child.userData.origZ, 0.1);
                child.rotation.x = THREE.MathUtils.lerp(child.rotation.x, 0, 0.1);
                child.rotation.z = THREE.MathUtils.lerp(child.rotation.z, 0, 0.1);
            }
        });
    }

    // --- 3. ACTUALIZACIÓN DE ESCALA EN LAS COTAS ---
    if (typeof cotasGroup !== 'undefined' && cotasGroup.visible) {
        const dist = camera.position.distanceTo(controls.target);
        const scaleFactor = Math.max(0.15, dist * 0.08);
        cotasGroup.children.forEach(child => {
            if (child.isSprite && child.userData.isCota) {
                child.scale.set(scaleFactor * child.userData.baseSX, scaleFactor * child.userData.baseSY, 1);
            }
        });
    }

    renderer.render(scene, camera);
}

function startTiltSim() {
    stopAllSims();
    toggleFloor(true); // Encender suelo
    
    saveHomeView(new THREE.Vector3(0, (group.userData.totalH || 1000) * 0.8, (group.userData.totalPL || 1200) * 2.5), new THREE.Vector3(0, (group.userData.totalH || 1000) * 0.4, 0));

    if (!pat) return alert("Primero optimiza la tarima.");
    
    const doubleStack = document.getElementById('doubleStack') && document.getElementById('doubleStack').checked;
    const numPallets = doubleStack ? 2 : 1;
    const loadH = pat.layers * pat.orient.dy;
    const totalH = (pH + loadH) * numPallets;
    
    const cgY = totalH / 2; // Centro de gravedad
    const baseWidth = Math.min(parseFloat(document.getElementById('palL').value), parseFloat(document.getElementById('palW').value));
    
    // Ángulo crítico de vuelco
    const semiBase = baseWidth / 2;
    criticalTiltAngle = Math.atan2(semiBase, cgY) * (180 / Math.PI);

    group.userData.totalH = totalH;
    group.userData.totalPL = baseWidth;

    const testAngle = 15; // Norma ISTA
    isFailingTilt = testAngle > criticalTiltAngle; 
    
    const color = isFailingTilt ? "#dc2626" : "#059669";
    const bgResult = isFailingTilt ? "#fef2f2" : "#ecfdf5";
    const msg = isFailingTilt ? `❌ FALLO ISTA 1A (Vuelco Inminente)` : `✅ PASA ISTA 1A (Estabilidad Aprobada)`;
    const sugerencia = isFailingTilt ? `💡 <b>Causa:</b> Centro de Gravedad muy alto (Volcará a los ${criticalTiltAngle.toFixed(1)}°).<br><b>Acción:</b> Reduce camas por tarima, elimina la doble estiba, o cambia a tarima más ancha.` : `💡 Centro de gravedad estable. Soporta balanceo marítimo/terrestre hasta ${criticalTiltAngle.toFixed(1)}° sin volcar.`;
    
    stabilityMsgSprite = makeTextSprite(isFailingTilt ? "¡COLAPSO!" : "ESTABLE", color);

    isTilted = true;
    tiltDirection *= -1; 
}

// --- ⛰️ BUSCADOR AUTOMÁTICO DE ALTITUD ---
async function fetchAltitude(cityInputId, altInputId) {
    const cityQuery = document.getElementById(cityInputId).value;
    const altInput = document.getElementById(altInputId);
    
    if (!cityQuery || cityQuery.trim() === "") return;

    altInput.value = "Buscando...";

    try {
        // 1. Primero, convertimos el nombre de la ciudad a coordenadas (Lat/Lon)
        let resGeo = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(cityQuery)}`);
        let dataGeo = await resGeo.json();
        
        if(dataGeo.length === 0) {
            altInput.value = "Error: No hallada";
            return;
        }

        let lat = dataGeo[0].lat;
        let lon = dataGeo[0].lon;

        // 2. Ahora, usamos las coordenadas para pedir la elevación (Altitud)
        let resAlt = await fetch(`https://api.open-meteo.com/v1/elevation?latitude=${lat}&longitude=${lon}`);
        let dataAlt = await resAlt.json();
        
        if (dataAlt.elevation && dataAlt.elevation.length > 0) {
            // Ponemos el número redondo en el campo
            altInput.value = Math.round(dataAlt.elevation[0]); 
            
            // Opcional: Mostrar un mensaje visual rápido de éxito (Toast)
            let resultDiv = document.getElementById('pressureResult');
            resultDiv.style.display = 'block';
            resultDiv.style.background = '#e8f8f5';
            resultDiv.style.borderLeft = '4px solid #1abc9c';
            resultDiv.innerHTML = `✅ <b>Altitud encontrada:</b> ${cityQuery} está a ~${Math.round(dataAlt.elevation[0])} msnm.`;
            setTimeout(() => { if(!simAnimFrame) resultDiv.style.display = 'none'; }, 3000); // Ocultar tras 3 segundos
            
        } else {
            altInput.value = "Error API";
        }

    } catch (error) {
        console.error("Error al buscar altitud:", error);
        altInput.value = "Fallo de Red";
    }
}

// --- 🛠️ MOTOR DE INGENIERÍA INVERSA ---
function generatePerfectBox() {
    const bL = parseFloat(document.getElementById('bagL').value); 
    const bD = parseFloat(document.getElementById('bagDMax').value) || parseFloat(document.getElementById('bagDMin').value); 
    const originalH = parseFloat(document.getElementById('bagH').value);
    
    if(isNaN(bL) || isNaN(bD) || isNaN(originalH)) {
        return alert("⚠️ Por favor, selecciona una marca y gramaje primero para conocer las medidas del producto.");
    }

    const foldAmount = parseFloat(document.getElementById('bagFold').value) || 0;
    const compL = parseFloat(document.getElementById('bagCompL').value) || 0;
    const compD = parseFloat(document.getElementById('bagCompD').value) || 0;
    
    const effectiveBH = originalH - foldAmount; 
    const effectiveBL = bL * (1 - (compL / 100)); 
    const effectiveBD = bD * (1 - (compD / 100));

    const invX = parseInt(document.getElementById('invX').value) || 1;
    const invY = parseInt(document.getElementById('invY').value) || 1;
    const invZ = parseInt(document.getElementById('invZ').value) || 1;

    const fluteT = parseFloat(document.getElementById('boxFlute').value) || 2.70;

    // 1. Calcular el interior exacto para no tener espacio muerto
    const intL = invX * effectiveBL;
    const intH = invY * effectiveBH;
    const intW = invZ * effectiveBD;

    // 2. Sumar la tolerancia y calibres de las paredes del corrugado
    const tolerancia = 2; // 2mm de juego para que el producto entre bien
    const extL = intL + (2 * fluteT) + tolerancia;
    const extW = intW + (2 * fluteT) + tolerancia;
    const extH = intH + (4 * fluteT) + tolerancia; // 4 grosores (2 solapas arriba, 2 abajo)

    // 3. Forzar los valores en la interfaz
    document.getElementById('boxL').value = Math.ceil(extL);
    document.getElementById('boxW').value = Math.ceil(extW);
    document.getElementById('boxH').value = Math.ceil(extH);
    
    updateInternalDimensions();
    
    // 4. Renderizar el nuevo modelo
    document.getElementById('boxViewType').value = 'diagonal';
    buildBagsInBox();

    // Añadir alerta visual de éxito
    const results = document.getElementById('results');
    results.innerHTML = `<span style="color:#27ae60;">✅ <b>¡Caja Perfecta Diseñada! (Espacio Muerto Mínimo)</b></span><br>` + results.innerHTML;
}
